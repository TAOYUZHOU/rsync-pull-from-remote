# Example rsync jobs config
# Copy to rsync_jobs.conf and edit. Never commit passwords here.

[example_job]
user=ubuntu
host=192.168.1.100
port=22
source=/data/backup/
dest=/home/ubuntu/backup/
identity=/home/ubuntu/.ssh/id_rsa
exclude=.git
exclude=__pycache__
delete=0
password_auth=0

[seetacloud_example]
user=root
host=connect.example.com
port=42994
source=/root/project/
dest=/home/ubuntu/project/
password_auth=1
exclude=.git
delete=0
